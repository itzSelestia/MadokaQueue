name: MadokaQueue
version: '${version}'

main: dev.yae.madokaQueue.MadokaQueue
api-version: '1.21.11'
load: POSTWORLD

authors: [ Selestia ]

commands:
  duel:
    description: Challenge another player to a duel
    usage: /duel <player> [gamemode] [rounds] | /duel accept <player> | /duel decline <player>
  rtpq:
    description: Join the random-teleport queue for a gamemode
    usage: /rtpq <gamemode>
